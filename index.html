<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Vault</title>
    <style>
        :root {
            --xp-blue: #0055e7;
            --xp-blue-light: #0078ff;
            --xp-bg: #ece9d8;
            --xp-border-light: #ffffff;
            --xp-border-dark: #808080;
            --xp-border-darkest: #404040;
            --xp-title-text: #ffffff;
        }

        body {
            background: #3a6ea5;
            font-family: Tahoma, Verdana, sans-serif;
            margin: 40px;
            color: #000;
        }

        .window {
            width: 550px;
            margin: auto;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000;
            border-bottom: 2px solid #000;
            background: var(--xp-bg);
            box-shadow: 4px 4px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .title {
            background: linear-gradient(to bottom, #0058ee 0%, #3590ff 4%, #288eff 6%, #127ae5 40%, #0058ee 100%);
            color: var(--xp-title-text);
            padding: 3px 6px;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 25px;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            text-shadow: 1px 1px #000;
        }

        .title-buttons {
            display: flex;
        }

        .title-button {
            width: 21px;
            height: 21px;
            background: #e04343;
            border: 1px solid #ffffff;
            border-radius: 3px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            line-height: 18px;
            text-align: center;
            cursor: pointer;
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.3);
        }

        .title-button:hover {
            background: #ff5a5a;
        }

        .content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #aca899;
        }

        button {
            background: linear-gradient(to bottom, #fcfcfc 0%, #f0f0f0 50%, #e0e0e0 51%, #dcdcdc 100%);
            border: 1px solid #003c74;
            border-radius: 3px;
            padding: 4px 15px;
            cursor: pointer;
            font-family: Tahoma, Verdana, sans-serif;
            font-size: 12px;
            color: #000;
            box-shadow: inset 0 0 1px #fff;
        }

        button:hover {
            border-color: #ff9d00;
            background: linear-gradient(to bottom, #fff 0%, #ffefd5 100%);
        }

        button:active {
            background: #dcdcdc;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2);
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid #707070;
            background: radial-gradient(circle at 4px 4px, #ff4040, #800000);
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }

        .status-indicator.active {
            background: radial-gradient(circle at 4px 4px, #40ff40, #008000);
            box-shadow: 0 0 5px #40ff40;
        }

        #list-container {
            background: #fff;
            border: 2px solid #7f9db9;
            height: 350px;
            overflow-y: auto;
            padding: 0;
        }

        .date-header {
            background: #f1f1f1;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .entry {
            padding: 8px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .entry:hover {
            background-color: #e8f3ff;
        }

        .entry-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 380px;
            color: #333;
        }

        .copy-btn {
            padding: 2px 8px;
            font-size: 11px;
        }

        ::-webkit-scrollbar {
            width: 16px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-left: 1px solid #dcdcdc;
        }
        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border: 1px solid #ffffff;
            box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title">
        <span>Clipboard Vault</span>
        <div class="title-buttons">
            <div class="title-button" onclick="window.close()">×</div>
        </div>
    </div>
    <div class="content">
        <div class="controls">
            <div id="status-light" class="status-indicator"></div>
            <button id="start-button" onclick="toggleWatching()">Start Watching Clipboard</button>
            <span style="font-size: 10px; color: #666; margin-left: auto;">(Tab must be focused to capture)</span>
        </div>
        <div id="list-container">
            <div id="list"></div>
        </div>
    </div>
</div>

<script>
    let seen = new Set();
    let running = false;
    let db;
    let lastDateStr = null;

    // Trigger check when window regains focus to "catch up"
    window.addEventListener('focus', () => {
        if (running) {
            checkClipboard();
        }
    });

    // Initialize IndexedDB
    const request = indexedDB.open("ClipboardVaultDB", 1);

    request.onerror = (event) => {
        console.error("Database error: " + event.target.errorCode);
    };

    request.onupgradeneeded = (event) => {
        const db = event.target.result;
        const objectStore = db.createObjectStore("clipboardEntries", { keyPath: "id", autoIncrement: true });
        objectStore.createIndex("text", "text", { unique: true });
        objectStore.createIndex("timestamp", "timestamp", { unique: false });
    };

    request.onsuccess = (event) => {
        db = event.target.result;
        loadEntries();
    };

    async function loadEntries() {
        const transaction = db.transaction(["clipboardEntries"], "readonly");
        const objectStore = transaction.objectStore("clipboardEntries");
        const index = objectStore.index("timestamp");
        const list = document.getElementById("list");
        list.innerHTML = '';
        lastDateStr = null;
        
        // Use a cursor to get entries sorted by timestamp (descending)
        index.openCursor(null, "prev").onsuccess = (event) => {
            const cursor = event.target.result;
            if (cursor) {
                const entry = cursor.value;
                seen.add(entry.text);
                renderEntry(entry, false); // Append because we are going prev (newest first)
                cursor.continue();
            }
        };
    }

    async function saveEntry(text) {
        if (!db) return;
        const timestamp = Date.now();
        const transaction = db.transaction(["clipboardEntries"], "readwrite");
        const objectStore = transaction.objectStore("clipboardEntries");
        
        const entry = { text, timestamp };
        const request = objectStore.add(entry);
        
        request.onsuccess = () => {
            // Re-render to handle grouping correctly if it's a new day
            // Or just prepend. Prepending is more efficient.
            renderEntry(entry, true);
        };
    }

    function formatDate(timestamp) {
        const date = new Date(timestamp);
        const today = new Date();
        const yesterday = new Date();
        yesterday.setDate(today.getDate() - 1);

        if (date.toDateString() === today.toDateString()) return "Today";
        if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
        
        return date.toLocaleDateString(undefined, { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
    }

    function renderEntry(entry, prepend = false) {
        const list = document.getElementById("list");
        const dateStr = formatDate(entry.timestamp);

        // Date grouping logic
        if (prepend) {
            // If prepending, check if the first child is the same date header
            const firstChild = list.firstChild;
            if (!firstChild || firstChild.textContent !== dateStr) {
                const header = document.createElement("div");
                header.className = "date-header";
                header.textContent = dateStr;
                list.prepend(header);
            }
        } else {
            // If appending (during load), add header if date changed
            if (dateStr !== lastDateStr) {
                const header = document.createElement("div");
                header.className = "date-header";
                header.textContent = dateStr;
                list.appendChild(header);
                lastDateStr = dateStr;
            }
        }

        const div = document.createElement("div");
        div.className = "entry";

        const span = document.createElement("span");
        span.className = "entry-text";
        span.textContent = entry.text.length > 100 ? entry.text.slice(0, 100) + "..." : entry.text;
        span.title = entry.text;

        const btn = document.createElement("button");
        btn.textContent = "Copy";
        btn.className = "copy-btn";
        btn.onclick = () => {
            navigator.clipboard.writeText(entry.text);
            btn.textContent = "Copied!";
            setTimeout(() => btn.textContent = "Copy", 1000);
        };

        div.appendChild(span);
        div.appendChild(btn);

        if (prepend) {
            // Insert after the date header
            list.insertBefore(div, list.children[1]);
        } else {
            list.appendChild(div);
        }
    }

    async function checkClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            if (text && !seen.has(text)) {
                seen.add(text);
                saveEntry(text);
            }
        } catch (e) {
            // Usually occurs if browser window is not focused
        }
    }

    function toggleWatching() {
        const btn = document.getElementById("start-button");
        const light = document.getElementById("status-light");
        
        if (!running) {
            running = true;
            btn.innerHTML = "Watching Clipboard...";
            light.classList.add("active");
            window.clipboardInterval = setInterval(checkClipboard, 2000);
        } else {
            running = false;
            btn.innerHTML = "Start Watching Clipboard";
            light.classList.remove("active");
            clearInterval(window.clipboardInterval);
        }
    }
</script>

</body>
</html>
