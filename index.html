<!doctypehtml><meta charset=UTF-8><title>Clipboard Vault</title><style>body{background:#3a6ea5;font-family:Tahoma,Verdana,sans-serif;margin:40px}.window{width:500px;margin:auto;border-top:2px solid #a6caf0;border-left:2px solid #a6caf0;border-right:2px solid #000;border-bottom:2px solid #000;background:#ece9d8;box-shadow:4px 4px rgba(0,0,0,.4)}.title{background:linear-gradient(to right,#0055e7,#0078ff);color:#fff;padding:4px 8px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center}.title-buttons{display:flex}.title-button{width:20px;height:20px;background-color:#d34b4b;border:1px solid #fff;color:#fff;font-family:Marlett,'Arial Black',sans-serif;font-size:12px;line-height:20px;text-align:center;margin-left:3px;cursor:pointer}.content{padding:15px}button{background:#ece9d8;border:1px solid #000;border-top-color:#fff;border-left-color:#fff;padding:5px 12px;cursor:pointer;font-family:Tahoma,Verdana,sans-serif}button:active{border-top-color:#000;border-left-color:#000;border-bottom-color:#fff;border-right-color:#fff}.entry{background:#fff;border:1px solid #7f9db9;padding:8px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;font-size:13px}</style><div class=window><div class=title><span>Clipboard Vault</span><div class=title-buttons><div class=title-button>r</div></div></div><div class=content><button id=start-button onclick=start()>Start Watching Clipboard</button><div id=list></div></div></div><script>let seen = new Set()
let running = false

async function checkClipboard(){
  try{
    const text = await navigator.clipboard.readText()

    if(text && !seen.has(text)){
      seen.add(text)
      addEntry(text)
    }

  }catch(e){}
}

function addEntry(text){
  const div = document.createElement("div")
  div.className = "entry"

  const span = document.createElement("span")
  span.textContent = text.slice(0,60)

  const btn = document.createElement("button")
  btn.textContent = "Recopy"
  btn.onclick = ()=>navigator.clipboard.writeText(text)

  div.appendChild(span)
  div.appendChild(btn)

  document.getElementById("list").prepend(div)
}

function start(){
  if(running) return
  running = true
  document.getElementById("start-button").innerHTML = "Watching Clipboard..."
  setInterval(checkClipboard,2000)
}</script>
